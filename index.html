<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation - Selviyani & Utom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<audio id="bg-music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="music-player">
<div class="music-ring"></div>
<button id="music-toggle">♫</button>
</div>

<!-- OPENING -->
<div id="opening-cover">
<div class="curtain left"></div>
<div class="curtain right"></div>
<div class="opening-content">
<h4>THE WEDDING OF</h4>
<h1>Selviyani Amelia & Muhammad Utom</h1>
<button id="btn-buka">Buka Undangan</button>
</div>
</div>

<!-- FOTO -->
<div class="photo-wrapper" data-aos="zoom-in">
    <div class="floral-frame"></div>
    <div class="photo-glow"></div>
    <div class="sparkle sparkle1"></div>
    <div class="sparkle sparkle2"></div>
    <div class="sparkle sparkle3"></div>

    <div class="couple-photo">
        <img src="foto-couple.png" alt="Selviyani & Utom">
    </div>
</div>

<main>

<!-- HERO -->
<section class="hero">
    <div class="hero-content" data-aos="zoom-in">
        <h4>THE WEDDING OF</h4>
        <h1>Selviyani & Utom</h1>
        <p>Minggu, 5 April 2026</p>
    </div>
</section>

<!-- COUNTDOWN -->
<section class="countdown" data-aos="fade-up">
<h2>Save The Date</h2>
<div class="countdown-timer">
<div class="count-box"><h3 id="days">0</h3><span>Hari</span></div>
<div class="count-box"><h3 id="hours">0</h3><span>Jam</span></div>
<div class="count-box"><h3 id="minutes">0</h3><span>Menit</span></div>
<div class="count-box"><h3 id="seconds">0</h3><span>Detik</span></div>
</div>
</section>

<!-- UCAPAN -->
<section class="comment-section" data-aos="fade-up">
<h2>Ucapan & Doa</h2>

<form id="comment-form" class="comment-box">
<input type="text" id="name" placeholder="Nama Anda" required>
<textarea id="message" placeholder="Tulis doa dan ucapan..." rows="4" required></textarea>
<button type="submit">Kirim Ucapan</button>
</form>

<div class="comment-list" id="comment-list"></div>
</section>

<footer>
<h3>Selviyani & Utom</h3>
<p>Terima kasih atas doa & restunya</p>
</footer>

</main>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({duration:1200,once:true});</script>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  serverTimestamp,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBo30suARbe1AoYiCKA7lZHvBELDIzqZJE",
  authDomain: "undangan-selvi-utom.firebaseapp.com",
  projectId: "undangan-selvi-utom",
  storageBucket: "undangan-selvi-utom.firebasestorage.app",
  messagingSenderId: "427727902420",
  appId: "1:427727902420:web:3aa23cc497871345d94d41",
  measurementId: "G-CKYCWEM63M"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("comment-form");
const list = document.getElementById("comment-list");

// SIMPAN UCAPAN
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const nama = document.getElementById("name").value.trim();
  const pesan = document.getElementById("message").value.trim();

  if (!nama || !pesan) return;

  await addDoc(collection(db, "ucapan"), {
    nama: nama,
    pesan: pesan,
    waktu: serverTimestamp()
  });

  form.reset();
});

// TAMPILKAN REALTIME
const q = query(collection(db, "ucapan"), orderBy("waktu", "desc"));

onSnapshot(q, (snapshot) => {
  list.innerHTML = "";

  snapshot.forEach((doc) => {
    const data = doc.data();

    list.innerHTML += `
      <div style="background:rgba(255,255,255,0.08);padding:15px;margin-bottom:15px;border-radius:12px;">
        <strong>${data.nama}</strong>
        <p style="margin-top:5px;">${data.pesan}</p>
      </div>
    `;
  });
});

// ================= COUNTDOWN =================
const weddingDate = new Date("April 5, 2026 12:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
  document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000);
}, 1000);

</script>

</body>
</html>
